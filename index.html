<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧警务调度系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <div class="logo-text">
                    <h1>智慧警务</h1>
                    <p>调度指挥系统</p>
                </div>
            </div>
            
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-details">
                    <span class="user-name">指挥中心</span>
                    <span class="user-role">管理员</span>
                </div>
                <button class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>指挥面板</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>地图监控</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>警力管理</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-car"></i>
                    <span>车辆调度</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-tasks"></i>
                    <span>任务管理</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>数据统计</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </nav>
            
            <div class="system-status">
                <h3>系统状态</h3>
                <div class="status-item">
                    <span>在线警员</span>
                    <span class="status-value" id="onlineOfficers">47</span>
                </div>
                <div class="status-item">
                    <span>可用车辆</span>
                    <span class="status-value" id="availableVehicles">12</span>
                </div>
                <div class="status-item">
                    <span>今日警情</span>
                    <span class="status-value" id="todayCases">23</span>
                </div>
                <div class="status-item">
                    <span>处理中</span>
                    <span class="status-value" id="processingCases">8</span>
                </div>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="content">
            <!-- 快速操作栏 -->
            <div class="quick-actions">
                <button class="action-btn emergency">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>紧急调度</span>
                </button>
                <button class="action-btn patrol">
                    <i class="fas fa-street-view"></i>
                    <span>巡逻安排</span>
                </button>
                <button class="action-btn backup">
                    <i class="fas fa-ambulance"></i>
                    <span>请求支援</span>
                </button>
                <button class="action-btn report">
                    <i class="fas fa-file-alt"></i>
                    <span>生成报告</span>
                </button>
            </div>

            <!-- 实时警情 -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-bell"></i> 实时警情</h2>
                    <div class="filter-options">
                        <select id="caseFilter">
                            <option value="all">全部类型</option>
                            <option value="emergency">紧急</option>
                            <option value="normal">一般</option>
                            <option value="traffic">交通</option>
                        </select>
                    </div>
                </div>
                <div class="cases-grid" id="casesGrid">
                    <!-- 警情卡片将通过JavaScript动态加载 -->
                </div>
            </section>

            <!-- 地图区域 -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-map"></i> 警力分布图</h2>
                    <div class="map-controls">
                        <button class="map-btn" id="refreshMap">
                            <i class="fas fa-sync-alt"></i> 刷新
                        </button>
                        <button class="map-btn" id="zoomIn">
                            <i class="fas fa-search-plus"></i>
                        </button>
                        <button class="map-btn" id="zoomOut">
                            <i class="fas fa-search-minus"></i>
                        </button>
                    </div>
                </div>
                <div class="map-container">
                    <div id="map"></div>
                    <div class="map-legend">
                        <div class="legend-item">
                            <span class="legend-color police"></span>
                            <span>巡逻警员</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color vehicle"></span>
                            <span>警车</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color incident"></span>
                            <span>警情地点</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 警力调度 -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-user-shield"></i> 可用警力</h2>
                    <div class="search-box">
                        <input type="text" placeholder="搜索警员或编号..." id="officerSearch">
                        <button><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="officers-grid" id="officersGrid">
                    <!-- 警员卡片将通过JavaScript动态加载 -->
                </div>
            </section>

            <!-- 任务列表 -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-clipboard-list"></i> 任务列表</h2>
                    <button class="add-task-btn" id="addTaskBtn">
                        <i class="fas fa-plus"></i> 新建任务
                    </button>
                </div>
                <div class="tasks-table-container">
                    <table class="tasks-table">
                        <thead>
                            <tr>
                                <th>任务编号</th>
                                <th>任务类型</th>
                                <th>负责人</th>
                                <th>状态</th>
                                <th>开始时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tasksTableBody">
                            <!-- 任务行将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- 底部状态栏 -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-left">
                <span><i class="fas fa-server"></i> 系统运行正常</span>
                <span><i class="fas fa-database"></i> 数据同步中...</span>
            </div>
            <div class="footer-center">
                <span>智慧警务调度系统 v1.0</span>
            </div>
            <div class="footer-right">
                <span id="currentTime">--:--:--</span>
                <span id="currentDate">----年--月--日</span>
            </div>
        </div>
    </footer>

    <!-- 紧急调度模态框 -->
    <div class="modal" id="emergencyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle"></i> 紧急调度</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="emergencyForm">
                    <div class="form-group">
                        <label for="emergencyType">警情类型</label>
                        <select id="emergencyType" required>
                            <option value="">请选择</option>
                            <option value="robbery">抢劫</option>
                            <option value="assault">袭击</option>
                            <option value="traffic_accident">交通事故</option>
                            <option value="fire">火灾</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="emergencyLocation">事发地点</label>
                        <input type="text" id="emergencyLocation" placeholder="输入地址或在地图上点击" required>
                    </div>
                    <div class="form-group">
                        <label for="emergencyDescription">情况描述</label>
                        <textarea id="emergencyDescription" rows="3" placeholder="详细描述警情..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dispatchUnits">调度单位</label>
                        <div class="units-selection">
                            <label><input type="checkbox" name="unit" value="patrol"> 巡逻队</label>
                            <label><input type="checkbox" name="unit" value="traffic"> 交警</label>
                            <label><input type="checkbox" name="unit" value="swat"> 特警</label>
                            <label><input type="checkbox" name="unit" value="ambulance"> 救护车</label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel close-modal">取消</button>
                        <button type="submit" class="btn-confirm">确认调度</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
